services:
  # The Go Network Agent we built
  collector:
    build: .
    container_name: network-collector
    restart: unless-stopped
    ports:
      - "2112:2112"
    volumes:
      - ./configs:/root/configs

  # Time-Series Database to scrape and store telemetry data
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml

  # The Real-Time Visual Web Interface
  grafana:
    image: grafana/grafana-oss:10.4.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin